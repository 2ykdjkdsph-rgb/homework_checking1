<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    :root {
      --bg: #f5efe6; --panel: rgba(255,251,244,0.94); --line: rgba(24,35,42,0.12);
      --ink: #1e2b2f; --muted: #607074; --accent: #0c6a78; --accent2: #b1652b; --shadow: 0 18px 60px rgba(44,33,22,0.12);
      --warn: #ab4232;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--ink); font-family: "Source Han Sans SC","Noto Sans SC","Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(177,101,43,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(12,106,120,0.14), transparent 30%),
        linear-gradient(180deg, #f8f3ec 0%, #efe5d6 100%);
      display: grid; place-items: center; padding: 20px;
    }
    .panel {
      width: min(520px, 100%); background: var(--panel); border: 1px solid rgba(255,255,255,0.72); border-radius: 26px;
      box-shadow: var(--shadow); padding: 28px;
    }
    .eyebrow { margin: 0 0 10px; font-size: 13px; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; }
    h1, p { margin: 0; }
    h1 { font-size: clamp(28px, 4vw, 40px); line-height: 1.08; }
    p.desc { margin-top: 12px; color: var(--muted); line-height: 1.75; font-size: 15px; }
    .tabs { display: flex; gap: 10px; margin-top: 20px; }
    .tab {
      flex: 1; min-height: 42px; border-radius: 999px; border: 1px solid rgba(24,35,42,0.12);
      background: rgba(255,255,255,0.8); cursor: pointer; font-weight: 700; color: var(--ink);
    }
    .tab.active { background: linear-gradient(135deg, var(--accent), #084f59); color: #fff; border-color: transparent; }
    form { display: grid; gap: 14px; margin-top: 20px; }
    .field { display: grid; gap: 8px; }
    label { font-weight: 700; font-size: 14px; }
    input {
      width: 100%; height: 46px; border-radius: 16px; border: 1px solid rgba(24,35,42,0.14); padding: 0 14px;
      background: rgba(255,255,255,0.82); color: var(--ink); font-size: 14px;
    }
    .actions, .links { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; min-height: 42px; padding: 0 16px;
      border-radius: 999px; border: 1px solid rgba(24,35,42,0.08); text-decoration: none; color: var(--ink);
      background: rgba(255,255,255,0.8); font-weight: 700; cursor: pointer;
    }
    .btn.primary { background: linear-gradient(135deg, var(--accent), #084f59); color: #fff; border-color: transparent; }
    .alert {
      display: none; margin-top: 16px; border-radius: 18px; padding: 14px 16px; line-height: 1.75; font-size: 14px;
      background: rgba(171,65,50,0.08); border: 1px solid rgba(171,65,50,0.16); color: var(--warn);
    }
    .alert.show { display: block; }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">Login</div>
    <h1>系统登录</h1>
    <p class="desc">教师使用工号登录并进入教师端，学生使用学号登录并进入学生端。</p>

    <div class="tabs">
      <button class="tab active" type="button" data-role="teacher">教师登录</button>
      <button class="tab" type="button" data-role="student">学生登录</button>
    </div>

    <form id="loginForm">
      <div class="field">
        <label id="idLabel" for="idInput">工号</label>
        <input id="idInput" type="text" placeholder="请输入工号">
      </div>
      <div class="field">
        <label for="passwordInput">密码</label>
        <input id="passwordInput" type="password" placeholder="请输入密码">
      </div>
      <div class="actions">
        <button class="btn primary" type="submit">登录</button>
      </div>
    </form>

    <div class="links" style="margin-top:16px;">
      <a class="btn" href="./register.html">注册账号</a>
      <a class="btn" href="./password.html">修改/重置密码</a>
    </div>

    <div class="alert" id="alertBox"></div>
  </div>

  <script src="./auth.js"></script>
  <script>
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const form = document.getElementById("loginForm");
    const idLabel = document.getElementById("idLabel");
    const idInput = document.getElementById("idInput");
    const passwordInput = document.getElementById("passwordInput");
    const alertBox = document.getElementById("alertBox");
    let currentRole = "teacher";

    const current = window.AuthStore.getCurrentUser();
    if (current) {
      window.location.replace(window.AuthStore.homeForRole(current.role));
    }

    function syncRole() {
      idLabel.textContent = currentRole === "teacher" ? "工号" : "学号";
      idInput.placeholder = currentRole === "teacher" ? "请输入工号" : "请输入学号";
      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.role === currentRole));
    }

    function showError(message) {
      alertBox.textContent = message;
      alertBox.classList.add("show");
    }

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        currentRole = tab.dataset.role;
        syncRole();
      });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const payload = {
        role: currentRole,
        password: passwordInput.value
      };
      if (currentRole === "teacher") payload.workerId = idInput.value;
      if (currentRole === "student") payload.studentId = idInput.value;
      const result = window.AuthStore.login(payload);
      if (!result.ok) {
        showError(result.message);
        return;
      }
      window.location.href = window.AuthStore.homeForRole(currentRole);
    });

    syncRole();
  </script>
</body>
</html>
