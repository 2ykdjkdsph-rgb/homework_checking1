<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码管理</title>
  <style>
    :root {
      --bg: #f5efe6; --panel: rgba(255,251,244,0.94); --line: rgba(24,35,42,0.12);
      --ink: #1e2b2f; --muted: #607074; --accent: #0c6a78; --shadow: 0 18px 60px rgba(44,33,22,0.12);
      --warn: #ab4232; --ok: #2f7d5c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: var(--ink); font-family: "Source Han Sans SC","Noto Sans SC","Segoe UI",sans-serif;
      background:
        radial-gradient(circle at top left, rgba(177,101,43,0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(12,106,120,0.14), transparent 30%),
        linear-gradient(180deg, #f8f3ec 0%, #efe5d6 100%);
      display: grid; place-items: center; padding: 20px;
    }
    .panel { width: min(620px, 100%); background: var(--panel); border: 1px solid rgba(255,255,255,0.72); border-radius: 26px; box-shadow: var(--shadow); padding: 28px; }
    .eyebrow { margin: 0 0 10px; font-size: 13px; letter-spacing: 0.16em; color: var(--accent); text-transform: uppercase; }
    h1, p { margin: 0; }
    h1 { font-size: clamp(28px, 4vw, 40px); line-height: 1.08; }
    p.desc { margin-top: 12px; color: var(--muted); line-height: 1.75; font-size: 15px; }
    .tabs { display: flex; gap: 10px; margin-top: 20px; }
    .tab { flex: 1; min-height: 42px; border-radius: 999px; border: 1px solid rgba(24,35,42,0.12); background: rgba(255,255,255,0.8); cursor: pointer; font-weight: 700; }
    .tab.active { background: linear-gradient(135deg, var(--accent), #084f59); color: #fff; border-color: transparent; }
    form { display: grid; gap: 14px; margin-top: 20px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field { display: grid; gap: 8px; }
    label { font-weight: 700; font-size: 14px; }
    input { width: 100%; height: 46px; border-radius: 16px; border: 1px solid rgba(24,35,42,0.14); padding: 0 14px; background: rgba(255,255,255,0.82); color: var(--ink); font-size: 14px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; padding: 0 16px; border-radius: 999px; border: 1px solid rgba(24,35,42,0.08); text-decoration: none; color: var(--ink); background: rgba(255,255,255,0.8); font-weight: 700; cursor: pointer; }
    .btn.primary { background: linear-gradient(135deg, var(--accent), #084f59); color: #fff; border-color: transparent; }
    .links { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    .alert { display: none; margin-top: 16px; border-radius: 18px; padding: 14px 16px; line-height: 1.75; font-size: 14px; }
    .alert.show { display: block; }
    .alert.warn { background: rgba(171,65,50,0.08); border: 1px solid rgba(171,65,50,0.16); color: var(--warn); }
    .alert.ok { background: rgba(47,125,92,0.1); border: 1px solid rgba(47,125,92,0.18); color: var(--ok); }
    @media (max-width: 720px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">Password</div>
    <h1>密码管理</h1>
    <p class="desc">通过学号或工号、联系方式完成密码重置。当前版本不再要求验证码。</p>
    <div class="tabs">
      <button class="tab active" type="button" data-role="teacher">教师</button>
      <button class="tab" type="button" data-role="student">学生</button>
    </div>
    <form id="passwordForm">
      <div class="grid">
        <div class="field">
          <label id="idLabel" for="idInput">工号</label>
          <input id="idInput" type="text" placeholder="请输入工号">
        </div>
        <div class="field">
          <label for="contactInput">联系方式</label>
          <input id="contactInput" type="text" placeholder="请输入注册联系方式">
        </div>
      </div>
      <div class="grid">
        <div class="field">
          <label for="passwordInput">新密码</label>
          <input id="passwordInput" type="password" placeholder="请输入新密码">
        </div>
        <div class="field">
          <label for="confirmPasswordInput">确认新密码</label>
          <input id="confirmPasswordInput" type="password" placeholder="请再次输入新密码">
        </div>
      </div>
      <div>
        <button class="btn primary" type="submit">确认修改</button>
      </div>
    </form>
    <div class="links">
      <a class="btn" href="./login.html">返回登录</a>
      <a class="btn" href="./register.html">注册账号</a>
    </div>
    <div class="alert" id="alertBox"></div>
  </div>

  <script src="./auth.js"></script>
  <script>
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const idLabel = document.getElementById("idLabel");
    const idInput = document.getElementById("idInput");
    const alertBox = document.getElementById("alertBox");
    const form = document.getElementById("passwordForm");
    let currentRole = "teacher";
    function syncRole() {
      idLabel.textContent = currentRole === "teacher" ? "工号" : "学号";
      idInput.placeholder = currentRole === "teacher" ? "请输入工号" : "请输入学号";
      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.role === currentRole));
    }
    function showAlert(type, message) {
      alertBox.className = `alert show ${type}`;
      alertBox.textContent = message;
    }
    tabs.forEach(tab => tab.addEventListener("click", () => {
      currentRole = tab.dataset.role;
      syncRole();
    }));
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const payload = {
        role: currentRole,
        contact: document.getElementById("contactInput").value,
        password: document.getElementById("passwordInput").value,
        confirmPassword: document.getElementById("confirmPasswordInput").value
      };
      if (currentRole === "teacher") payload.workerId = idInput.value;
      if (currentRole === "student") payload.studentId = idInput.value;
      const result = window.AuthStore.updatePassword(payload);
      if (!result.ok) {
        showAlert("warn", result.message);
        return;
      }
      showAlert("ok", "密码修改成功，正在返回登录页面。");
      setTimeout(() => { window.location.href = "./login.html"; }, 700);
    });
    syncRole();
  </script>
</body>
</html>
